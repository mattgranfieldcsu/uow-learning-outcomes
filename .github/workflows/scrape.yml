name: Scrape UOW Learning Outcomes

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of subjects to scrape'
        required: false
        default: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Essential packages for the scraper to run in the cloud
          pip install playwright
          playwright install chromium

      - name: Prepare Data Directory
        run: mkdir -p data

      - name: Run Scraper
        run: |
          # Clean out the old database to ensure fresh results
          rm -f data/outcomes.db
          # Direct execution of the scraper file
          python scraper/uow_scraper.py --limit ${{ github.event.inputs.limit || 20 }}

      - name: Commit and Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all data changes
          git add -f data/
          
          # Only commit if data was actually found and saved
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Results: Fresh UOW scrape [$(date -u +%Y-%m-%d)]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}