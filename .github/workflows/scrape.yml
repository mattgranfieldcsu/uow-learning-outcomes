name: Scrape UOW Learning Outcomes

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of subjects to scrape'
        required: false
        default: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Ensure playwright and other basics are installed
          pip install playwright
          playwright install chromium

      - name: Prepare Data Directory
        run: mkdir -p data

	- name: Run Scraper
        run: |
          rm -f data/outcomes.db
          python scraper/uow_scraper.py --limit ${{ github.event.inputs.limit || 20 }}

      - name: Commit and Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git commit -m "Results: Fresh UOW scrape [$(date -u +%Y-%m-%d)]" || echo "No changes"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}