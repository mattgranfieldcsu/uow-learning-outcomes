name: Scrape UOW Learning Outcomes

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of subjects to scrape'
        required: false
        default: '20'
  schedule:
    # Runs at 00:00 UTC every Sunday to keep data fresh
    - cron: '0 0 * * 0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Prepare Data Directory
        run: mkdir -p data

      - name: Run Scraper
        run: |
          # CRITICAL: Delete the old database to clear out the "500" error ghosts
          rm -f data/outcomes.db
          # Run the scraper with the "Search-First" logic you just pushed
          python main.py --limit ${{ github.event.inputs.limit || 20 }}
        env:
          # If you're using OpenAI/Anthropic for the Bloom's tagging, ensure the key is here
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit and Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add the files to bypass any .gitignore rules
          git add -f data/outcomes.db data/outcomes_snapshot.csv
          
          # Only commit if there are actually changes to the data
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Results: Fresh scrape of UOW outcomes [$(date -u +%Y-%m-%d)]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}