name: Scrape UOW Learning Outcomes

on:
  schedule:
    # Run at 2am AEST (16:00 UTC) every Sunday
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max subjects to scrape (leave blank for all)'
        required: false
        default: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # We skip the cache restore for this run to ensure we aren't 
      # accidentally loading an empty 'ghost' database.
      - name: Ensure data directory exists
        run: mkdir -p data/raw

      - name: Initialise database
        run: python -m db.loader

      - name: Run scraper
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -n "$LIMIT" ]; then
            python scraper/uow_scraper.py --limit "$LIMIT"
          else
            python scraper/uow_scraper.py
          fi

      - name: Tag learning outcomes (Bloom's / category)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m db.tagger
        continue-on-error: true

      - name: Export CSV snapshot
        run: |
          python db/export_csv.py

      - name: Print stats
        run: python query.py stats || echo "Stats script not found, skipping."

      # This is the "Safety Net": It saves the DB as an artifact you can download 
      # directly from the Actions UI if the Git push fails.
      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: outcomes-data
          path: |
            data/outcomes.db
            data/outcomes_snapshot.csv
          retention-days: 7

      - name: Commit and Push Data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/outcomes_snapshot.csv data/outcomes.db
          # The '|| exit 0' ensures the workflow doesn't fail if there's nothing new to commit
          git commit -m "chore: update outcomes data [$(date -u +%Y-%m-%d)]" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}